# ETL project template — copy to pyproject.toml and customize.
# Supports both uv and Poetry workflows.

[project]
name = "etl-project"
version = "0.1.0"
description = "ETL package for Databricks deployment"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pyspark>=3.5.0",
    "delta-spark>=3.2.0",
    "pandas>=2.0.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.8.0",
    "pre-commit>=4.0",
    "databricks-connect>=15.0",
]

[project.scripts]
etl = "etl_project.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/etl_project"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["src/etl_project"]