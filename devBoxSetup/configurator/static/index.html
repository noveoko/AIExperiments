<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevBox Setup Configurator</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="banner">
    <div>
      <h1>DevBox Setup Configurator</h1>
      <p style="color: var(--muted); font-size: 0.85rem; margin-top: 0.15rem;">
        Proactive environment builder — localhost only
      </p>
    </div>
    <span class="badge">LOCAL ONLY · NO DATA SENT</span>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <ol class="step-nav" id="step-nav"></ol>
      <div class="profile-bar">
        <label for="profile-select">Saved profiles</label>
        <select id="profile-select">
          <option value="">— New profile —</option>
        </select>
      </div>
    </aside>

    <main class="main">
      <div id="step-container"></div>
      <div class="actions" id="nav-actions">
        <button class="btn btn-secondary" id="btn-back" disabled>Back</button>
        <button class="btn btn-secondary" id="btn-save">Save profile</button>
        <button class="btn btn-primary" id="btn-next">Next</button>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/static/app.js"></script>
</body>
</html>
